name: Daily Liquidity Pressure Index Update

on:
  schedule:
    # 每天北京时间早上8点运行 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run Liquidity Pressure Index Model
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python liquidity_pressure_index.py
      
      - name: Update README with timestamp
        run: |
          sed -i "s/\*Last updated:.*/\*Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')\*/" README.md
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Daily update: $(date -u '+%Y-%m-%d')"
          git push
